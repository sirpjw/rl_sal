                  35.0, 45.0, 45.0,
                  35.0, 45.0, 45.0,
                  35.0, 45.0, 45.0]
  # Policy order used by this exported parkour model:
  # [FL_hip, FR_hip, RL_hip, RR_hip, FL_thigh, FR_thigh, RL_thigh, RR_thigh, FL_calf, FR_calf, RL_calf, RR_calf].
  default_dof_pos: [ 0.1, -0.1,  0.1, -0.1,
                     0.8,  0.8,  1.0,  1.0,
                    -1.5, -1.5, -1.5, -1.5]
  # Policy order -> Gazebo controller order [FR, FL, RR, RL] x [hip, thigh, calf].
  joint_mapping: [3, 0, 9, 6, 4, 1, 10, 7, 5, 2, 11, 8]
  # Parkour specific parameters
  num_prop: 53
  num_scan: 132
  num_priv_explicit: 9
  num_priv_latent: 29
  history_length: 10
  scandots_latent_dim: 32
  use_depth: true
